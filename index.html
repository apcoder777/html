    <script>
        const imageInput = document.getElementById('imageInput');
        const uploadCard = document.getElementById('uploadCard');
        const changeBtn = document.getElementById('changeBtn');

        // 1. CHECK FOR SAVED WALLPAPER ON LOAD
        window.onload = function() {
            const savedWallpaper = localStorage.getItem('userWallpaper');
            if (savedWallpaper) {
                applyWallpaper(savedWallpaper);
            }
        };

        // 2. HANDLE NEW UPLOADS
        imageInput.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const base64Image = e.target.result;
                    
                    // Save to browser memory
                    localStorage.setItem('userWallpaper', base64Image);
                    
                    // Apply to screen
                    applyWallpaper(base64Image);
                }
                reader.readAsDataURL(file);
            }
        });

        // 3. APPLY WALLPAPER FUNCTION
        function applyWallpaper(imgData) {
            document.body.style.backgroundImage = `url('${imgData}')`;
            uploadCard.classList.add('hidden');
            changeBtn.style.display = 'block';
        }

        // 4. RESET/CHANGE LOGIC
        changeBtn.addEventListener('click', function() {
            uploadCard.classList.remove('hidden');
            changeBtn.style.display = 'none';

 

        });
    </script>
